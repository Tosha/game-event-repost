name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore -r win-x64

      - name: Build
        run: dotnet build --configuration Release --no-restore -r win-x64

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
